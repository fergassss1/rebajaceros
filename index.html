<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rebajaceros</title>

<script type="module" src="https://unpkg.com/@material/web/all.js?module"></script>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,100..1000&family=Google+Sans+Code:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f4f2fa;
  display: flex;
  justify-content: center;
  padding: 40px;
  font-family: "Google Sans Flex", sans-serif;
}

.card {
  background: white;
  padding: 32px;
  border-radius: 28px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  width: 460px;
  text-align: center;
}

.operacion {
  font-family: "Google Sans Code", monospace;
  font-size: 44px;
  text-align: right;
  margin-top: 24px;
}

.linea {
  border-bottom: 3px solid #333;
  margin: 6px 0 10px 0;
}

.resultado {
  display: flex;
  justify-content: flex-end;
}

.resultado input {
  width: 42px;
  font-size: 44px;
  text-align: center;
  border: none;
  border-bottom: 2px solid #ccc;
  outline: none;
  font-family: "Google Sans Code", monospace;
  margin-left: 4px;
}

.resultado input.error {
  border-bottom: 2px solid #d32f2f;
}

.resultado input.correcto {
  border-bottom: 2px solid #2e7d32;
}

.botones {
  margin-top: 24px;
  display: flex;
  justify-content: center;
  gap: 12px;
}
</style>
</head>

<body>

<div class="card" id="menu">
  <h2>Rebajaceros</h2>

  <p>Haz las 10 restas para llegar a 0!</p>
  <md-outlined-text-field id="cifras" type="number" value="6"></md-outlined-text-field>

  <br><br>

  <md-filled-button onclick="generarAleatorio()">Número Aleatorio</md-filled-button>

  <p>O escribir número (debe terminar en 0)</p>
  <md-outlined-text-field id="numeroManual" type="number"></md-outlined-text-field>

  <br><br>
  <md-filled-button onclick="empezarManual()">Empezar</md-filled-button>
</div>

<div class="card" id="juego" style="display:none;"></div>

<script>
let numeroInicial = 0;
let actual = 0;
let restaFija = 0;

function generarAleatorio(){
  let cifras = parseInt(document.getElementById("cifras").value);
  let min = Math.pow(10, cifras-1);
  let max = Math.pow(10, cifras) - 1;
  let numero;

  do{
    numero = Math.floor(Math.random()*(max-min+1))+min;
  }while(numero % 10 !== 0);

  empezarJuego(numero);
}

function empezarManual(){
  let numero = parseInt(document.getElementById("numeroManual").value);

  if(isNaN(numero) || numero<=0 || numero%10!==0){
    alert("Debe ser un número válido que termine en 0");
    return;
  }

  empezarJuego(numero);
}

function empezarJuego(numero){
  numeroInicial = numero;
  actual = numero;
  restaFija = Math.floor(numeroInicial/10);

  document.getElementById("menu").style.display="none";
  document.getElementById("juego").style.display="block";

  crearOperacion();
}

function crearOperacion(){

  if(actual===0){
    document.getElementById("juego").innerHTML=
      "<h2>¡Has llegado a 0!</h2><br><md-filled-button onclick='volverMenu()'>Volver</md-filled-button>";
    return;
  }

  let correcto = (actual - restaFija).toString();

  let html = `
  <h3>Resta paso a paso</h3>
  <div class="operacion">
      <div>${actual}</div>
      <div>- ${restaFija}</div>
      <div class="linea"></div>
      <div class="resultado" id="resultado"></div>
  </div>

  <div class="botones">
      <md-filled-button onclick="comprobar()">Comprobar</md-filled-button>
      <md-outlined-button onclick="ayuda()">Ayuda</md-outlined-button>
      <md-text-button onclick="volverMenu()">Salir</md-text-button>
  </div>
  `;

  document.getElementById("juego").innerHTML = html;

  let contenedor = document.getElementById("resultado");

  // Creamos inputs de izquierda a derecha pero enfocamos el último
  for(let i=0;i<correcto.length;i++){
    let input = document.createElement("input");
    input.maxLength=1;
    input.dataset.index=i;

    input.addEventListener("input", manejarEscritura);
    input.addEventListener("keydown", manejarBorrado);

    contenedor.appendChild(input);
  }

  // Enfocar último (derecha)
  contenedor.lastChild.focus();
}

function manejarEscritura(e){
  let input = e.target;
  let valor = input.value.replace(/[^0-9]/g,"");
  input.value = valor;

  if(valor.length===1){
    let anterior = input.previousElementSibling;
    if(anterior){
      anterior.focus();
    }
  }
}

function manejarBorrado(e){
  if(e.key==="Backspace" && e.target.value===""){
    let siguiente = e.target.nextElementSibling;
    if(siguiente){
      siguiente.focus();
    }
  }
}

function comprobar(){
  let correcto = (actual - restaFija).toString();
  let inputs = document.querySelectorAll(".resultado input");
  let todoBien=true;

  inputs.forEach((input,i)=>{
    if(input.value!==correcto[i]){
      input.classList.add("error");
      todoBien=false;
    }else{
      input.classList.remove("error");
      input.classList.add("correcto");
    }
  });

  if(todoBien){
    actual -= restaFija;
    setTimeout(crearOperacion,600);
  }
}

function ayuda(){
  let correcto = (actual - restaFija).toString();
  let inputs = document.querySelectorAll(".resultado input");

  for(let i=inputs.length-1;i>=0;i--){
    if(inputs[i].value!==correcto[i]){
      inputs[i].value=correcto[i];
      inputs[i].classList.add("correcto");
      inputs[i].focus();
      break;
    }
  }
}

function volverMenu(){
  document.getElementById("menu").style.display="block";
  document.getElementById("juego").style.display="none";
}
</script>

</body>
</html>
