<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebajaceros</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .game-container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .challenge-box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        .number-big { color: #007bff; font-weight: bold; font-size: 1.5rem; }
        .step-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 8px; border-radius: 8px; background: #fafafa; }
        .step-row.locked { opacity: 0.4; pointer-events: none; }
        .step-row.success { background: #d4edda; border: 1px solid #c3e6cb; }
        input { width: 120px; padding: 8px; border: 2px solid #ddd; border-radius: 5px; text-align: center; font-size: 1rem; }
        input:focus { border-color: #007bff; outline: none; }
        input.error { border-color: #dc3545; background: #fff3f3; }
        .btn-new { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-new:hover { background: #218838; }
        .msg { font-weight: bold; margin-top: 10px; min-height: 24px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1>Rebajaceros</h1>
        <p>Resta 10 veces el número hasta llegar a 0</p>
        <button class="btn-new" onclick="iniciarJuego()">Nuevo partida aleatoria</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="challenge-box">
            Empiezas con: <span class="number-big" id="valInicial"></span><br>
            Resta siempre: <span class="number-big" id="valSustraendo"></span>
        </div>
        
        <div id="stepsContainer"></div>
        <div id="feedback" class="msg"></div>
    </div>
</div>

<script>
    let sustraendo, actual;

    function iniciarJuego() {
        // Generamos un número aleatorio de 3 o 4 cifras
        sustraendo = Math.floor(Math.random() * 9000) + 100;
        actual = sustraendo * 10;
        
        document.getElementById('valInicial').innerText = (actual).toLocaleString();
        document.getElementById('valSustraendo').innerText = (sustraendo).toLocaleString();
        document.getElementById('gameArea').style.display = 'block';
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('stepsContainer');
        container.innerHTML = "";

        // Crear las 10 filas de restas
        let valorPrevio = actual;
        for (let i = 1; i <= 10; i++) {
            const row = document.createElement('div');
            row.className = `step-row ${i > 1 ? 'locked' : ''}`;
            row.id = `row-${i}`;
            
            row.innerHTML = `
                <span>${i}) ${valorPrevio.toLocaleString()} - ${sustraendo.toLocaleString()} = </span>
                <input type="number" id="input-${i}" onchange="comprobar(${i}, ${valorPrevio - sustraendo})">
            `;
            container.appendChild(row);
            valorPrevio -= sustraendo;
        }
        document.getElementById('input-1').focus();
    }

    function comprobar(step, resultadoCorrecto) {
        const input = document.getElementById(`input-${step}`);
        const userVal = parseInt(input.value);
        const feedback = document.getElementById('feedback');

        if (userVal === resultadoCorrecto) {
            input.classList.remove('error');
            document.getElementById(`row-${step}`).classList.add('success');
            input.disabled = true;
            
            if (step < 10) {
                const nextRow = document.getElementById(`row-${step + 1}`);
                nextRow.classList.remove('locked');
                document.getElementById(`input-${step + 1}`).focus();
                feedback.innerText = "¡Bien! Siguiente resta...";
                feedback.style.color = "#28a745";
            } else {
                feedback.innerText = "¡PERFECTO! Has llegado a 0 sin errores. 🎉";
                feedback.style.color = "#28a745";
            }
        } else {
            input.classList.add('error');
            feedback.innerText = "¡Error! Revisa la resta.";
            feedback.style.color = "#dc3545";
        }
    }
</script>

</body>
</html>
    <script>
        function generarAutomatico() {
            const range = parseInt(document.getElementById('difficulty').value);
            // Genera un número aleatorio basado en el rango
            const sustraendo = Math.floor(Math.random() * (range - (range/10)) + (range/10));
            const inicial = sustraendo * 10;
            
            const area = document.getElementById('displayArea');
            let html = `<p>Número inicial: <br><span class="highlight">${inicial.toLocaleString()}</span></p>`;
            html += `<p>Resta 10 veces: <strong>${sustraendo.toLocaleString()}</strong></p>`;
            html += `<hr>`;

            let actual = inicial;
            for (let i = 1; i <= 10; i++) {
                let anterior = actual;
                actual -= sustraendo;
                let claseFinal = (actual === 0) ? 'final-zero' : '';
                html += `<div class="step">${i}) ${anterior.toLocaleString()} - ${sustraendo.toLocaleString()} = <span class="${claseFinal}">${actual.toLocaleString()}</span></div>`;
            }

            area.innerHTML = html;
        }
    </script>
</body>
</html>
